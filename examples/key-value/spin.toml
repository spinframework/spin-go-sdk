spin_manifest_version = 2

[application]
authors = ["Rajat Jindal <rajatjindal83@gmail.com>"]
description = "A simple Spin application written in Go."
name = "hello-kv"
version = "1.0.0"

[[trigger.http]]
route = "/hello"
component = "hello"

[component.hello]
source = "main.wasm"
key_value_stores = ["default"]
[component.hello.build]
command = "componentize-go --world http-trigger --wit-module github.com/spinframework/spin-go-sdk/v3 build"
