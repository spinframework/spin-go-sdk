spin_manifest_version = 2

[application]
name = "variables-example"
authors = ["Fermyon Engineering <engineering@fermyon.com>"]
description = "A simple Spin application written in Go."
version = "1.0.0"

[variables]
object = { default = "teapot" }

[[trigger.http]]
route = "/..."
component = "variables"

[component.variables]
source = "main.wasm"
[component.variables.variables]
message = "I'm a {{object}}"

[component.variables.build]
command = "componentize-go --world http-trigger --wit-module github.com/spinframework/spin-go-sdk/v3 build"
